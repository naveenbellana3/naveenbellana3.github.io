<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A sleek, modern developer portfolio with animated sections and dark theme.">
  <title>Portfolio</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

  <!-- ============ HEADER / NAVIGATION ============ -->
  <header class="navbar" id="site-header">
    <div class="navbar__gradient-border">
      <nav class="navbar__inner">
        <div class="navbar__mobile-header">
          <span class="navbar__logo">P</span>
          <button class="navbar__hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </div>
        <ul class="navbar__links">
          <!-- Populated by JS from navigation.json -->
        </ul>
      </nav>
    </div>
  </header>

  <!-- ============ HERO SECTION ============ -->
  <section class="hero section" id="hero">
    <div class="hero-grid-bg"></div>
    <div class="hero-meteors"></div>

    <div class="container">
      <div class="hero-container">
        <!-- Left: Text content -->
        <div class="hero-content reveal-left">
          <div class="hero-blur hero-blur--blue"></div>
          <div class="hero-blur hero-blur--teal"></div>

          <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            <span class="hero-badge-text">Welcome to my universe</span>
          </div>

          <h1 class="hero-name">
            <!-- Populated by JS -->
          </h1>

          <div class="hero-role-badge">
            <span class="hero-role-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            </span>
            <div class="hero-role-text">
              <!-- Populated by JS -->
            </div>
          </div>

          <p class="hero-tagline"></p>

          <div class="hero-ctas">
            <a href="#projects" class="btn btn--primary">
              <span class="btn-inner"><span>View Projects</span></span>
            </a>
            <a href="#contact" class="btn btn--secondary">
              <span class="btn-inner"><span>Get Resume</span></span>
            </a>
          </div>

          <div class="hero-floating-badges">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Right: Code window -->
        <div class="hero-code-col reveal-right">
          <div class="code-window-border">
            <div class="code-window">
              <div class="code-window-header">
                <div class="code-window-dot code-window-dot--red"></div>
                <div class="code-window-dot code-window-dot--yellow"></div>
                <div class="code-window-dot code-window-dot--green"></div>
                <span class="code-window-filename">developer.js</span>
              </div>
              <pre class="code-window-body"><!-- Populated by JS --></pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-scroll-indicator">
      <span>About me</span>
      <svg class="hero-scroll-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </section>

  <!-- ============ ABOUT SECTION ============ -->
  <section class="about section" id="about">
    <div class="container">
      <div class="about-grid reveal-up">
        <div>
          <h2 class="about-roles"></h2>
          <div class="about-image-wrapper">
            <!-- Populated by JS -->
          </div>
        </div>
        <div>
          <div class="about-text">
            <!-- Populated by JS -->
          </div>
          <div class="about-highlights">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ SKILLS SECTION ============ -->
  <section class="skills section" id="skills">
    <div class="skills-grid-bg"></div>
    <div class="container" style="position: relative; z-index: 5;">
      <h2 class="section-title reveal-up">Skills & Technologies</h2>
      <div class="skills-grid stagger-children">
        <!-- Populated by JS -->
      </div>
      <div class="icon-cloud-section reveal-up">
        <div class="icon-cloud-container" id="iconCloud">
          <div class="icon-cloud-sphere" id="iconCloudSphere">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ EXPERIENCE SECTION ============ -->
  <section class="experience section" id="experience">
    <div class="experience-grid-bg"></div>
    <div class="exp-particles"></div>
    <div class="experience-blur experience-blur--purple"></div>
    <div class="experience-blur experience-blur--cyan"></div>
    <div class="container" style="position: relative; z-index: 10;">
      <div class="reveal-up" style="text-align: center; margin-bottom: 3.5rem;">
        <h2 class="section-title">Professional Journey</h2>
        <p class="section-subtitle"></p>
      </div>
      <div class="experience-grid stagger-children">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ============ PROJECTS SECTION ============ -->
  <section class="projects section" id="projects">
    <div class="container">
      <div class="reveal-up" style="text-align: center; margin-bottom: 3.5rem;">
        <h2 class="section-title">Featured Projects</h2>
      </div>
      <div class="projects-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- ============ EDUCATION SECTION ============ -->
  <section class="education section" id="education">
    <div class="education-grid-bg"></div>
    <div class="container" style="position: relative; z-index: 5;">
      <div class="reveal-up" style="text-align: center; margin-bottom: 3rem;">
        <h2 class="section-title">Educational Journey</h2>
        <p class="section-subtitle"></p>
      </div>
      <div class="education-grid stagger-children">
        <!-- Populated by JS -->
      </div>
      <div class="education-certs reveal-up" style="display: none;">
        <div class="education-certs-title">Certifications & Awards</div>
        <div class="education-certs-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ============ CONTACT SECTION ============ -->
  <section class="contact section" id="contact">
    <div class="container">
      <div class="contact-grid">
        <!-- Left: Info -->
        <div class="reveal-left">
          <h2 class="section-title" style="text-align: left;">Get In Touch</h2>
          <p class="contact-subheading"></p>
          <div class="contact-details">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Right: Form -->
        <div class="reveal-right">
          <div class="contact-form-wrapper">
            <form class="contact-form" novalidate>
              <input type="text" name="name" class="form-input" placeholder="Your Name" required>
              <input type="email" name="email" class="form-input" placeholder="Your Email" required>
              <input type="text" name="subject" class="form-input" placeholder="Subject">
              <textarea name="message" class="form-input form-textarea" placeholder="Your Message" rows="4" required></textarea>
              <button type="submit" class="btn btn--primary btn--full">
                <span class="btn-inner">
                  <span>Send Message</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </span>
              </button>
            </form>
            <div class="contact-status"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="footer" id="site-footer">
    <div class="container">
      <div class="footer-top">
        <div>
          <p class="footer-tagline"></p>
        </div>
        <div class="footer-links">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="footer-divider"></div>
      <p class="footer-copyright"></p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
